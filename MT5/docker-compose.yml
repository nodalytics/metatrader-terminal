services:
  mt5-terminal:
    image: ghcr.io/nodalytics/mt5-terminal:latest
    ports:
      - "18812:18812"
      - "6901:6901"
    environment:
      VNC_USER: ${VNC_USER}
      VNC_PASSWORD: ${VNC_PASSWORD}
      MT5_ACCOUNT_NUMBER: ${MT5_ACCOUNT_NUMBER}
      MT5_PASSWORD: ${MT5_PASSWORD}
      MT5_SERVER: ${MT5_SERVER}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
