services:
  mt5-terminal:
    image: ghcr.io/nodalytics/mt5-terminal:latest
    ports:
      - "6901:6901"
      - "8000:8000"
    environment:
      VNC_USER: ${VNC_USER}
      VNC_PASSWORD: ${VNC_PASSWORD}
      MT5_LOGIN: ${MT5_ACCOUNT_NUMBER}
      MT5_API_PORT: 8000
      API_KEY_SEED: ${API_KEY_SEED:-"default-seed-for-dev"}
      MT5_PASSWORD: ${MT5_PASSWORD}
      MT5_SERVER: ${MT5_SERVER}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
        reservations:
          memory: 512M
