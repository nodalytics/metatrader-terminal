name: Docker Build & Test

on:
  push:
    branches: [main, dev]
    paths:
      - "MT5/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "MT5/**"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mt5-terminal

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build the Docker image and verify it starts correctly
  # ----------------------------------------------------------------
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      # Build the image (no push on PRs; push on main/dev)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: MT5
          push: false
          load: true  # load into local daemon for smoke test
          tags: mt5-terminal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test: start the container and verify it's running
      - name: Smoke test — container starts
        run: |
          docker run -d \
            --name mt5-terminal-test \
            -p 18812:18812 \
            -p 5900:5900 \
            -e MT5_ACCOUNT_NUMBER=123456 \
            -e MT5_PASSWORD=test \
            -e MT5_SERVER=MetaQuotes-Demo \
            mt5-terminal:ci

          echo "Waiting for container to be ready..."
          sleep 20
          
          # Check if container is still running
          if [ "$(docker inspect -f '{{.State.Running}}' mt5-terminal-test)" = "true" ]; then
             echo "✅ Container is running"
          else
             echo "❌ Container failed to start"
             docker logs mt5-terminal-test
             exit 1
          fi

          # Check for supervisord/wine logs
          docker logs mt5-terminal-test
          if docker logs mt5-terminal-test 2>&1 | grep -q "supervisord started"; then
             echo "✅ Supervisord started successfully"
          else
             echo "⚠️ Supervisord startup message not found in logs, but container is running."
          fi

      - name: Dump container logs on failure
        if: failure()
        run: docker logs mt5-terminal-test

      - name: Cleanup container
        if: always()
        run: docker rm -f mt5-terminal-test || true

  # ----------------------------------------------------------------
  # Job 2: Push to GHCR on main branch merges only
  # ----------------------------------------------------------------
  docker-push:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: MT5
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
